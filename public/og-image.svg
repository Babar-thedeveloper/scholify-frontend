<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#065f46"/>
      <stop offset="0.55" stop-color="#059669"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(980 96) rotate(120) scale(560)">
      <stop stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark + wordmark -->
  <g transform="translate(90 92)">
    <rect width="88" height="88" rx="22" fill="#ffffff" fill-opacity="0.14"/>
    <polygon points="44,22 76,38 44,54 12,38" fill="#ffffff"/>
    <path d="M22 43 Q22 63 44 69 Q66 63 66 43" fill="#ffffff" fill-opacity="0.85"/>
    <text x="112" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Scholify</text>
  </g>

  <!-- Headline -->
  <text x="90" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff">Every scholarship &amp;</text>
  <text x="90" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="76" font-weight="800" fill="#a7f3d0">internship, one search.</text>

  <!-- Subtitle -->
  <text x="92" y="488" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="500" fill="#d1fae5">For Pakistani students - national, international &amp; provincial.</text>

  <!-- Free badge -->
  <g transform="translate(92 522)">
    <rect width="196" height="52" rx="26" fill="#ffffff"/>
    <text x="98" y="34" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="25" font-weight="700" fill="#065f46">100% Free</text>
  </g>
</svg>
